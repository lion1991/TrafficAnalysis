<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>客户端流量 - TrafficAnalysis</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Client Traffic Console</p>
          <h1>客户端流量</h1>
        </div>
        <nav class="navLinks" aria-label="页面导航">
          <a href="/">总览</a>
          <a href="/clients.html" aria-current="page">客户端</a>
          <a href="/analysis.html">流量分析</a>
        </nav>
        <div class="status" id="status">等待查询</div>
      </section>

      <section class="controls clientsControls" aria-label="客户端查询条件">
        <label class="controlPreset">
          时间范围
          <select id="preset">
            <option value="1h">最近 1 小时</option>
            <option value="6h">最近 6 小时</option>
            <option value="24h">最近 24 小时</option>
            <option value="7d">最近 7 天</option>
            <option value="date">指定日期</option>
            <option value="daterange">日期范围</option>
            <option value="custom">自定义范围</option>
          </select>
        </label>
        <label>
          日期
          <input id="date" type="date" />
        </label>
        <label>
          开始日期
          <input id="fromDate" type="date" />
        </label>
        <label>
          结束日期
          <input id="toDate" type="date" />
        </label>
        <label>
          开始时间
          <input id="from" type="datetime-local" />
        </label>
        <label>
          结束时间
          <input id="to" type="datetime-local" />
        </label>
        <label>
          客户端 IP
          <input id="clientIP" type="text" placeholder="192.168.248.22" />
        </label>
        <label class="checkbox">
          <input id="autoRefresh" type="checkbox" />
          自动刷新
        </label>
        <button id="queryButton" type="button" class="controlAction">查询</button>
        <button id="resetButton" type="button" class="controlAction btnReset">重置</button>
      </section>

      <section class="metrics clientsMetrics" aria-label="客户端汇总">
        <article class="metric upload">
          <span>客户端上传</span>
          <strong id="uploadTotal">0 B</strong>
        </article>
        <article class="metric download">
          <span>客户端下载</span>
          <strong id="downloadTotal">0 B</strong>
        </article>
        <article class="metric">
          <span>客户端数量</span>
          <strong id="clientTotal">0</strong>
        </article>
        <article class="metric">
          <span>包数量</span>
          <strong id="packetTotal">0</strong>
        </article>
      </section>

      <section class="chartPanel" aria-label="客户端流量汇总">
        <div class="chartTitle">
          <h2>客户端汇总</h2>
          <p><span id="rangeText">-</span>；实时速率每秒更新</p>
        </div>
        <div class="tableWrap wideTable">
          <table class="clientsTable">
            <thead>
              <tr>
                <th class="nameCol"><button class="sortButton" type="button" data-sort="display_name">名称</button></th>
                <th class="sourceCol"><button class="sortButton" type="button" data-sort="name_source">来源</button></th>
                <th class="ipCol"><button class="sortButton" type="button" data-sort="client_ip">客户端 IP</button></th>
                <th class="macCol">MAC</th>
                <th class="rateCol"><button class="sortButton" type="button" data-sort="upload_bps">实时上传</button></th>
                <th class="rateCol"><button class="sortButton" type="button" data-sort="download_bps">实时下载</button></th>
                <th class="bytesCol"><button class="sortButton" type="button" data-sort="upload_bytes">上传</button></th>
                <th class="bytesCol"><button class="sortButton" type="button" data-sort="download_bytes">下载</button></th>
                <th class="bytesCol"><button class="sortButton" type="button" data-sort="total_bytes">总计</button></th>
                <th class="packetCol"><button class="sortButton" type="button" data-sort="packets">包</button></th>
                <th class="aliasCol">别名</th>
              </tr>
            </thead>
            <tbody id="clientsBody">
              <tr><td colspan="11">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/clients.js" defer></script>
  </body>
</html>
